<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta http-equiv="Cache-Control" content="no-cache">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

    <title>Fluid</title>

    <script src="js/dat.gui.min.js"></script>

    <style>
        * {
            user-select: none;
        }

        html, body {
            overflow: hidden;
            background-color: #000;
        }

        body {
            margin: 0;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        canvas {
            width: 100%;
            height: 100%;

            /* 🎨 keep colors but prevent white burn */
            filter: brightness(0.95) contrast(1.15) saturate(1.8);        }
    </style>
</head>

<body>
    <canvas></canvas>
    <script src="js/script.js"></script>
</body>
</html>
